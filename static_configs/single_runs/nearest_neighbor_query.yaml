task:
  type: ExtremalPointTask
  dataset: GrowingCircles
  dataset_config:
    length: 10
    min_points: 50
    max_points: 100
  ood_dataset: GrowingCircles
  ood_config:
    length: 10
    min_points: 150
    max_points: 200
backbone:
  type: QueryNetwork
  encoder: 
    type: Transformer
    n_heads: 1
    n_layers: 2
    d_model: 128
    key_dim: 512
    feed_forward_hidden_dim: 128
batch_size: 128
learning_rate: 1.e-4
debug_mode: True
loss_function: l1_loss
