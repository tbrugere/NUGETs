task:
  type: AlphaShape2MembershipTask
  dataset: GaussianBlobs
  dataset_config:
    length: 1000
    min_points: 50
    max_points: 100
    centers: 4
    dim: 2
  ood_dataset: GaussianBlobs
  ood_config:
    length: 100
    min_points: 100
    max_points: 150
    centers: 4
    dim: 2
backbone:
  type: SetNN
  d_model: 16
  embedding_layers: 3
  embedding_hidden_dim: 64
batch_size: 32
learning_rate: 1.e-4
loss_function: scatter_binary_focal_loss