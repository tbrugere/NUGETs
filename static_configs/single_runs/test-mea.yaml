task:
  type: MinimumEnclosingAnnulusTask
  dataset: GrowingCircles
  dataset_config:
    length: 10
    min_points: 50
    max_points: 100
  ood_dataset: GrowingCircles
  ood_config:
    length: 10
    min_points: 200
    max_points: 300
backbone:
  type: Transformer
  n_heads: 2
  n_layers: 2
  d_model: 128
  key_dim: 512
  feed_forward_hidden_dim: 128
batch_size: 128
learning_rate: 1.e-4
loss_function: minimum_annulus_radius_error
