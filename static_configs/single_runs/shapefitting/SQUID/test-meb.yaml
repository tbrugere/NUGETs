task:
  type: MinimumEnclosingBallTask
  dataset: GaussianBlob
  dataset_config:
    length: 10
    min_points: 20
    max_points: 30
  ood_dataset: GaussianBlob
  ood_config:
    length: 10
    min_points: 50
    max_points: 100
backbone:
  type: Sumformer
  n_heads: 2
  n_layers: 2
  d_model: 128
  key_dim: 512
  feed_forward_hidden_dim: 128
  positional_encoding: SinusoidalAbsolutePositionalEncoding
batch_size: 128
learning_rate: 1.e-4
loss_function: minimum_ball_radius_error