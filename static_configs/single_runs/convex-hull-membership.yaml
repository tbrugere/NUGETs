task:
  type: ConvexHullMembershipTask
  dataset: GaussianBlob
  dataset_config:
    dim: 2
    min_points: 10
    max_points: 20
  ood_dataset: GaussianBlob
  ood_config:
    dim: 2
    min_points: 10
    max_points: 20
backbone:
  type: Transformer
  n_heads: 2
  n_layers: 2
  d_model: 128
  key_dim: 512
  feed_forward_hidden_dim: 128
batch_size: 10
learning_rate: 1.e-4
loss_function: scatter_binary_cross_entropy