task:
  type: ConvexHullMembershipTask
  dataset: GaussianBlob
  dataset_config:
    length: 10
    min_points: 8
    max_points: 32
  ood_dataset: GaussianBlob
  ood_config:
    length: 10
    min_points: 100
    max_points: 200
backbone:
  type: Sumformer
  n_heads: 2
  n_layers: 2
  d_model: 128
  key_dim: 512
  feed_forward_hidden_dim: 128
batch_size: 10
learning_rate: 1.e-4
loss_function: scatter_binary_cross_entropy