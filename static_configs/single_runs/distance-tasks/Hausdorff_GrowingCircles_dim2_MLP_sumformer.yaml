task:
  type: HausdorffDistanceTask
  dataset: GrowingCircles
  dataset_config:
    length: 100
    min_points: 50
    max_points: 100
  ood_dataset: GrowingCircles
  ood_config:
    length: 10
    min_points: 150
    max_points: 200
backbone:
  type: CoupledNetwork
  latent_dimension: 32
  p: 1
  reconstruct_input: False
  decoder_distance: SinkhornLoss
  use_siamese: False
  encoder: 
    type: Sumformer
    n_heads: 1
    n_layers: 1
    d_model: 128
    key_dim: 512
    feed_forward_hidden_dim: 128
  decoder:
    decoder_hidden_dim: 256
    decoder_n_layers: 3
batch_size: 128
learning_rate: 1.e-4
debug_mode: True
