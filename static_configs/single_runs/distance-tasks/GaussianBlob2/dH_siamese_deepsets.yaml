task:
  type: HausdorffDistanceTask
  dataset: GaussianBlobs
  dataset_config:
    length: 100
    min_points: 50
    max_points: 100
    centers: 4
  ood_dataset: GaussianBlobs
  ood_config:
    length: 10
    min_points: 150
    max_points: 200
    centers: 4
backbone:
  type: CoupledNetwork
  latent_dimension: 32
  p: 1
  reconstruct_input: false
  decoder_distance: SinkhornLoss
  use_siamese: false
  aggregation: sum
  encoder:
    type: SetNN
    d_model: 64
    embedding_layers: 2
    embedding_hidden_dim: 128
  decoder:
    decoder_hidden_dim: 256
    decoder_n_layers: 3
batch_size: 128
learning_rate: 0.0001
debug_mode: true
loss_function: mse_loss
