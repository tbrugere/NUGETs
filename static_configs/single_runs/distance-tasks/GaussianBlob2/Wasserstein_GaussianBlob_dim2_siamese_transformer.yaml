task:
  type: WassersteinDistanceTask
  dataset: GaussianBlobs
  dataset_config:
    length: 100
    min_points: 50
    max_points: 100
    centers: 4
  ood_dataset: GaussianBlobs
  ood_config:
    length: 80
    min_points: 100
    max_points: 150
    centers: 4
backbone:
  type: CoupledNetwork
  latent_dimension: 32
  p: 2
  reconstruct_input: False
  use_siamese: True
  decoder_distance: SinkhornLoss
  encoder: 
    type: Transformer
    n_heads: 2
    n_layers: 2
    d_model: 128
    key_dim: 512
    feed_forward_hidden_dim: 128
batch_size: 128
learning_rate: 1.e-4
debug_mode: True
loss_function: mse_loss
