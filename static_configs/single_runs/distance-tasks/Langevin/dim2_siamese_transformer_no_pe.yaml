task:
  type: FrechetDistanceTask
  dataset: RandomTrajectory
  dataset_config:
    length: 100
    min_points: 10
    max_points: 20
    type: Langevin
    scaling: 10
  ood_dataset: RandomTrajectory
  ood_config:
    length: 20
    min_points: 20
    max_points: 30
    type: Langevin
    scaling: 10
backbone:
  type: CoupledNetwork
  latent_dimension: 32
  p: 1
  reconstruct_input: False
  decoder_distance: SinkhornLoss
  use_siamese: False
  encoder: 
    type: Sumformer
    n_heads: 2
    n_layers: 2
    d_model: 128
    key_dim: 512
    feed_forward_hidden_dim: 128
  decoder:
    decoder_hidden_dim: 256
    decoder_n_layers: 2
batch_size: 128
learning_rate: 1.e-4
debug_mode: True
loss_function: mse_loss